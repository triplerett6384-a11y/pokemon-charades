<!DOCTYPE html>
<html>
<head>
<title>Pokemon Charades</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff4e4e,#ffcc00);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
transition:background 0.6s;
}

.card{
background:white;
width:420px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

button{
padding:12px 20px;
margin:8px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.generate{background:#ff4747;color:white;}
.timer{background:#3498db;color:white;}
.got{background:#2ecc71;color:white;}

.pokemonBox{
position:relative;
display:inline-block;
}

#pokemonImage{
width:220px;
height:220px;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,255,0,0.5);
display:none;
border-radius:10px;
}

#pokemonName{
font-size:30px;
margin-top:10px;
text-transform:capitalize;
}

#countdown{
font-size:26px;
margin-top:10px;
transition:0.3s;
}

.timesup{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<h1>Pokémon Charades</h1>

<div class="pokemonBox">
<img id="pokemonImage">
<div class="overlay" id="doneOverlay"></div>
</div>

<div id="pokemonName">Press New Pokémon</div>

<div id="countdown">60</div>

<br>

<button class="generate" onclick="generatePokemon()">New Pokémon</button>
<button class="timer" onclick="startTimer()">Start Round</button>
<button class="got" onclick="gotIt()">Got It!</button>

</div>

<script>

let timer
let time = 60

function resetTimer(){
clearInterval(timer)
time = 60

let c = document.getElementById("countdown")
c.innerText = 60
c.classList.remove("timesup")
}

function startTimer(){

clearInterval(timer)

document.getElementById("countdown").classList.remove("timesup")

timer = setInterval(function(){

time--

document.getElementById("countdown").innerText = time

if(time <= 0){

clearInterval(timer)

let c = document.getElementById("countdown")
c.innerText = "TIME'S UP!"
c.classList.add("timesup")

}

},1000)

}

function gotIt(){

clearInterval(timer)

document.getElementById("doneOverlay").style.display = "block"

}

async function generatePokemon(){

resetTimer()

document.getElementById("doneOverlay").style.display = "none"

let id = Math.floor(Math.random()*1025)+1

let res = await fetch("https://pokeapi.co/api/v2/pokemon/"+id)
let data = await res.json()

document.getElementById("pokemonImage").src =
data.sprites.other["official-artwork"].front_default

document.getElementById("pokemonName").innerText = data.name

let type = data.types[0].type.name

const colors = {
fire:["#ff512f","#f09819"],
water:["#2193b0","#6dd5ed"],
grass:["#56ab2f","#a8e063"],
electric:["#fddb92","#d1fdff"],
psychic:["#ff5f6d","#ffc371"],
ice:["#83a4d4","#b6fbff"],
dragon:["#654ea3","#eaafc8"],
dark:["#232526","#414345"],
fairy:["#ff9a9e","#fad0c4"],
fighting:["#cb2d3e","#ef473a"],
poison:["#41295a","#2F0743"],
ground:["#ba8b02","#181818"],
rock:["#bdc3c7","#2c3e50"],
bug:["#a8e063","#56ab2f"],
ghost:["#4b6cb7","#182848"],
steel:["#757f9a","#d7dde8"],
flying:["#89f7fe","#66a6ff"],
normal:["#bdc3c7","#2c3e50"]
}

let gradient = colors[type] || ["#ff4e4e","#ffcc00"]

document.body.style.background =
"linear-gradient(135deg,"+gradient[0]+","+gradient[1]+")"

}

</script>

</body>
</html>
